name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --noconsole --name local-dev-server server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-dev-server-windows
          path: dist/local-dev-server.exe
          retention-days: 30
          
